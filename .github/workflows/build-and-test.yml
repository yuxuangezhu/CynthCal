name: Build and test

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
    types: [synchronize, opened, reopened, ready_for_review]

jobs:
  lunarbar-mac:
    name: CynthCalMac
    runs-on: macos-26
    if: github.event.pull_request.draft == false
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.0.app/Contents/Developer

    steps:
      - uses: actions/checkout@v5
      - name: Build CynthCalMac
        run: |
          xcodebuild build -scheme CynthCalMac -destination 'platform=macOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Test CynthCalKitTests
        run: |
          xcodebuild test -scheme CynthCalKitTests -destination 'platform=macOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Test CynthCalMacTests
        run: |
          xcodebuild test -scheme CynthCalMacTests -destination 'platform=macOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
